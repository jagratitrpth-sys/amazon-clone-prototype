<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="robots" content="index, follow">
    <meta name="description" content="Amazon clone prototype built using HTML and CSS. This project recreates the basic UI of Amazon homepage.">
    <meta name="keywords" content="Amazon clone, HTML CSS project, ecommerce prototype, frontend project">
    
    <title>Amazon Clone</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <header>
        <div class="navbar">
            <div class="nav-logo border">
                <div class="logo">
                </div>
            </div>
            <div class="nav-address border">
                <p class="add-first">
                    Deliver to
                </p>
                <div class="add-icon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add-sec">India</p>
                </div>
            </div>
            <div class="nav-search-border">
                <select class="search-select">
                    <option value="all">All</option>
                    <option value="books">Books</option>
                    <option value="electronics">Electronics</option>
                    <option value="clothing">Clothing</option>
                    <option value="home">Home & Kitchen</option>
                    <option value="toys">Toys & Games</option>
                    <option value="sports">Sports & Outdoors</option>
                    <option value="beauty">Beauty & Personal Care</option>
                </select>
                <input type="text" class="search-input" placeholder="Search Amazon.in">
                <div class="search-icon">
                <button><i class="fa-solid fa-magnifying-glass"></i></button>
                </div>
            </div>

            </div>
        </div>
    </header>
    
</body>
</html>
